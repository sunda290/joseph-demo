<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Joseph Bucci — Client Gallery (Demo)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Archivo:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;}
.jb-root{
  --paper:#f4f2ee;--card:#fbfaf8;--ink:#16130f;--soft:#79716a;
  --line:rgba(22,19,15,0.14);--white:#fff;
  background:var(--paper);color:var(--ink);font-family:'Archivo',sans-serif;
  min-height:100vh;width:100%;-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden;
}
.jb-serif{font-family:'Fraunces',serif;}
.jb-label{font-size:11px;letter-spacing:0.28em;text-transform:uppercase;color:var(--soft);font-weight:500;}
.jb-bar{display:flex;align-items:center;justify-content:space-between;padding:22px 28px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:40;background:rgba(244,242,238,0.86);backdrop-filter:blur(10px);}
.jb-mark{font-family:'Fraunces',serif;font-weight:500;font-size:26px;letter-spacing:-0.02em;line-height:1;}
.jb-mark small{font-size:11px;letter-spacing:0.24em;font-family:'Archivo';color:var(--soft);display:block;margin-top:4px;font-weight:500;}
.jb-toggle{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:4px;background:var(--ink);padding:5px;border-radius:999px;z-index:90;box-shadow:0 12px 40px rgba(0,0,0,0.25);}
.jb-toggle button{border:0;background:transparent;color:rgba(255,255,255,0.55);font-family:'Archivo';font-size:11px;letter-spacing:0.18em;text-transform:uppercase;padding:9px 18px;border-radius:999px;cursor:pointer;font-weight:500;transition:all .25s ease;}
.jb-toggle button.on{background:var(--white);color:var(--ink);}
.jb-btn{font-family:'Archivo';font-size:12px;letter-spacing:0.16em;text-transform:uppercase;font-weight:500;cursor:pointer;border:1px solid var(--ink);background:var(--ink);color:var(--white);padding:15px 30px;transition:all .3s cubic-bezier(.2,.7,.3,1);}
.jb-btn:hover{background:transparent;color:var(--ink);}
.jb-btn.ghost{background:transparent;color:var(--ink);}
.jb-btn.ghost:hover{background:var(--ink);color:var(--white);}
.jb-btn:disabled{opacity:.35;cursor:not-allowed;}
.jb-entry{min-height:calc(100vh - 0px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px 120px;}
.jb-fade{opacity:0;transform:translateY(14px);animation:jbUp .9s cubic-bezier(.2,.7,.3,1) forwards;}
@keyframes jbUp{to{opacity:1;transform:none;}}
.jb-entry h1{font-family:'Fraunces',serif;font-weight:300;font-size:clamp(40px,8vw,78px);line-height:1.02;letter-spacing:-0.02em;margin:18px 0 14px;max-width:14ch;}
.jb-entry .meta{color:var(--soft);font-size:13px;letter-spacing:0.04em;margin-bottom:38px;}
.jb-entry .meta b{color:var(--ink);font-weight:500;}
.jb-scan{display:flex;align-items:center;gap:10px;margin-bottom:30px;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--soft);}
.jb-scan .dot{width:6px;height:6px;border-radius:50%;background:#3aa76d;animation:pulse 2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(58,167,109,.45)}70%{box-shadow:0 0 0 9px rgba(58,167,109,0)}100%{box-shadow:0 0 0 0 rgba(58,167,109,0)}}
.jb-gwrap{padding:30px 22px 130px;max-width:1180px;margin:0 auto;}
.jb-ghead{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:18px;margin-bottom:30px;}
.jb-ghead h2{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(28px,5vw,46px);letter-spacing:-0.02em;}
.jb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media(max-width:760px){.jb-grid{grid-template-columns:repeat(2,1fr);}}
.jb-cell{position:relative;overflow:hidden;background:#ddd9d2;cursor:pointer;}
.jb-cell.tall{grid-row:span 2;}
.jb-cell img{width:100%;height:100%;object-fit:cover;filter:grayscale(1) contrast(1.04);display:block;transition:transform .9s cubic-bezier(.2,.7,.3,1);}
.jb-cell:hover img{transform:scale(1.045);}
.jb-wm{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(-32deg,rgba(255,255,255,0) 0 70px,rgba(255,255,255,0.10) 70px 71px);}
.jb-wm span{font-family:'Archivo';font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.85);text-shadow:0 1px 3px rgba(0,0,0,.4);}
.jb-cell .num{position:absolute;top:10px;left:12px;font-family:'Archivo';font-size:11px;letter-spacing:0.12em;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6);}
.jb-pick{position:absolute;bottom:12px;right:12px;width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.9);background:rgba(0,0,0,0.18);color:#fff;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);transition:all .25s ease;font-size:15px;}
.jb-cell:hover .jb-pick{background:rgba(0,0,0,0.4);}
.jb-pick.on{background:#fff;color:var(--ink);border-color:#fff;}
.jb-lb{position:fixed;inset:0;z-index:80;background:rgba(18,15,12,0.92);display:flex;align-items:center;justify-content:center;padding:20px;animation:jbFade .3s ease forwards;}
@keyframes jbFade{from{opacity:0}to{opacity:1}}
.jb-lb-inner{display:flex;gap:28px;max-width:1000px;width:100%;align-items:center;}
@media(max-width:760px){.jb-lb-inner{flex-direction:column;gap:16px;overflow:auto;max-height:100%;}}
.jb-lb-img{flex:1;position:relative;background:#000;min-height:0;}
.jb-lb-img img{width:100%;max-height:74vh;object-fit:contain;filter:grayscale(1) contrast(1.04);display:block;}
.jb-lb-panel{width:300px;flex-shrink:0;color:#f4f2ee;}
@media(max-width:760px){.jb-lb-panel{width:100%;}}
.jb-lb-panel h3{font-family:'Fraunces',serif;font-weight:300;font-size:30px;margin-bottom:6px;}
.jb-opt{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.14);cursor:pointer;}
.jb-opt:hover{color:#fff;}
.jb-opt .nm{font-size:13px;letter-spacing:0.02em;}
.jb-opt .nm small{display:block;color:rgba(244,242,238,0.5);font-size:11px;letter-spacing:0.04em;margin-top:2px;}
.jb-opt .pr{font-family:'Fraunces',serif;font-size:18px;}
.jb-close{position:absolute;top:18px;right:22px;color:#fff;background:none;border:0;font-size:30px;cursor:pointer;z-index:81;line-height:1;opacity:.7;}
.jb-close:hover{opacity:1;}
.jb-page{max-width:820px;margin:0 auto;padding:40px 22px 130px;}
.jb-page h2{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(30px,5vw,48px);letter-spacing:-0.02em;margin-bottom:6px;}
.jb-rowi{display:flex;gap:16px;align-items:center;padding:18px 0;border-bottom:1px solid var(--line);}
.jb-rowi img{width:64px;height:80px;object-fit:cover;filter:grayscale(1);background:#ddd;}
.jb-rowi .info{flex:1;}
.jb-rowi .info .t{font-family:'Fraunces',serif;font-size:18px;}
.jb-rowi .info .s{font-size:12px;color:var(--soft);letter-spacing:0.04em;margin-top:3px;}
.jb-rowi .price{font-family:'Fraunces',serif;font-size:20px;}
.jb-rowi .rm{background:none;border:0;color:var(--soft);cursor:pointer;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;margin-top:6px;}
.jb-rowi .rm:hover{color:var(--ink);}
.jb-tot{display:flex;justify-content:space-between;align-items:center;margin-top:26px;padding-top:22px;border-top:2px solid var(--ink);}
.jb-tot .lbl{font-family:'Archivo';letter-spacing:0.16em;text-transform:uppercase;font-size:13px;}
.jb-tot .amt{font-family:'Fraunces',serif;font-size:34px;}
.jb-field{margin-bottom:16px;}
.jb-field label{display:block;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--soft);margin-bottom:7px;font-weight:500;}
.jb-field input{width:100%;padding:13px 15px;border:1px solid var(--line);background:var(--white);font-family:'Archivo';font-size:14px;color:var(--ink);}
.jb-field input:focus{outline:none;border-color:var(--ink);}
.jb-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.jb-empty{text-align:center;padding:80px 0;color:var(--soft);}
.jb-succ{text-align:center;padding:90px 24px 140px;max-width:560px;margin:0 auto;}
.jb-succ .ring{width:64px;height:64px;border-radius:50%;border:1.5px solid var(--ink);display:flex;align-items:center;justify-content:center;margin:0 auto 26px;font-size:26px;}
.jb-succ h2{font-family:'Fraunces',serif;font-weight:300;font-size:42px;margin-bottom:14px;}
.jb-dl{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:30px;}
.jb-studio{max-width:1080px;margin:0 auto;padding:34px 22px 130px;}
.jb-studio .sub{color:var(--soft);font-size:14px;margin-bottom:34px;max-width:60ch;line-height:1.6;}
.jb-gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
.jb-gcard{background:var(--card);border:1px solid var(--line);display:flex;flex-direction:column;}
.jb-gcard .cover{height:150px;background:#ddd9d2;position:relative;overflow:hidden;}
.jb-gcard .cover img{width:100%;height:100%;object-fit:cover;filter:grayscale(1) contrast(1.05);}
.jb-gcard .cover .st{position:absolute;top:10px;left:10px;background:var(--ink);color:#fff;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;padding:5px 9px;}
.jb-gcard .body{padding:18px;}
.jb-gcard .body h3{font-family:'Fraunces',serif;font-weight:400;font-size:22px;letter-spacing:-0.01em;}
.jb-gcard .body .m{font-size:12px;color:var(--soft);letter-spacing:0.03em;margin-top:5px;}
.jb-gcard .qr{display:flex;align-items:center;gap:16px;padding:16px 18px;border-top:1px solid var(--line);}
.jb-gcard .qr .acts{display:flex;flex-direction:column;gap:8px;flex:1;}
.jb-mini{font-family:'Archivo';font-size:11px;letter-spacing:0.14em;text-transform:uppercase;font-weight:500;padding:9px 12px;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;text-align:center;transition:all .25s;}
.jb-mini:hover{background:var(--ink);color:#fff;}
.jb-newcard{border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;min-height:300px;cursor:pointer;color:var(--soft);transition:all .3s;background:transparent;}
.jb-newcard:hover{border-color:var(--ink);color:var(--ink);background:var(--card);}
.jb-newcard .plus{font-family:'Fraunces',serif;font-weight:300;font-size:46px;line-height:1;margin-bottom:8px;}
.jb-note{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:12px;letter-spacing:0.06em;padding:11px 20px;border-radius:999px;z-index:95;animation:jbFade .3s;}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function QR({ size = 96, seed = 7 }) {
  const n = 21, cells = [];
  let s = seed * 9973;
  const rnd = () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff; };
  const isFinder = (r, c) => {
    const inBox = (br, bc) => r >= br && r < br + 7 && c >= bc && c < bc + 7;
    return inBox(0, 0) || inBox(0, n - 7) || inBox(n - 7, 0);
  };
  for (let r = 0; r < n; r++) for (let c = 0; c < n; c++) {
    if (isFinder(r, c)) {
      const local = (br, bc) => { const rr = r - br, cc = c - bc;
        return (rr === 0 || rr === 6 || cc === 0 || cc === 6) || (rr >= 2 && rr <= 4 && cc >= 2 && cc <= 4); };
      let on = false;
      if (r < 7 && c < 7) on = local(0, 0);
      else if (r < 7 && c >= n - 7) on = local(0, n - 7);
      else if (r >= n - 7 && c < 7) on = local(n - 7, 0);
      if (on) cells.push(<rect key={r+"-"+c} x={c} y={r} width="1" height="1" />);
    } else if (rnd() > 0.55) {
      cells.push(<rect key={r+"-"+c} x={c} y={r} width="1" height="1" />);
    }
  }
  return (<svg width={size} height={size} viewBox={`-1 -1 ${n+2} ${n+2}`} style={{ background: "#fff", flexShrink: 0 }}><g fill="#16130f">{cells}</g></svg>);
}

const photo = (seed) => `https://picsum.photos/seed/${seed}/640/800`;
const PHOTOS = [
  { id:1, seed:"jbG1", tall:true },{ id:2, seed:"jbG2" },{ id:3, seed:"jbG3" },
  { id:4, seed:"jbG4" },{ id:5, seed:"jbG5", tall:true },{ id:6, seed:"jbG6" },
  { id:7, seed:"jbG7" },{ id:8, seed:"jbG8" },{ id:9, seed:"jbG9", tall:true },
  { id:10, seed:"jbG10" },{ id:11, seed:"jbG11" },{ id:12, seed:"jbG12" },
];
const OPTIONS = [
  { key:"web", nm:"Digital — Web", sub:"2000px, watermark-free", price:18 },
  { key:"hi", nm:"Digital — High-res", sub:"Full resolution + print license", price:45 },
  { key:"p8", nm:'Fine print — 8×10"', sub:"Archival matte, shipped", price:60 },
  { key:"p16", nm:'Fine print — 16×20"', sub:"Archival matte, shipped", price:130 },
];
const STUDIO_GALLERIES = [
  { id:1, name:"Hamilton Golf Classic — 2026", imgs:240, status:"Live", seed:"jbS1" },
  { id:2, name:"Glendale Charity Scramble — June", imgs:168, status:"Live", seed:"jbS2" },
  { id:3, name:"Junior Open — Qualifiers", imgs:96, status:"Draft", seed:"jbS3" },
];

function App() {
  const [view, setView] = useState("client");
  const [screen, setScreen] = useState("entry");
  const [cart, setCart] = useState([]);
  const [lb, setLb] = useState(null);
  const [note, setNote] = useState("");
  useEffect(() => { if (!note) return; const t = setTimeout(() => setNote(""), 1700); return () => clearTimeout(t); }, [note]);

  const inCart = (pid) => cart.some((c) => c.pid === pid);
  const addItem = (pid, opt) => { setCart((c) => [...c.filter((x) => !(x.pid === pid && x.key === opt.key)), { uid: pid+"-"+opt.key, pid, ...opt }]); setNote("Added to selection"); };
  const togglePick = (pid) => { if (inCart(pid)) setCart((c) => c.filter((x) => x.pid !== pid)); else addItem(pid, OPTIONS[1]); };
  const total = cart.reduce((s, x) => s + x.price, 0);

  return (
    <div className="jb-root">
      <div className="jb-bar">
        <div className="jb-mark">jb{view === "studio" && <small>STUDIO</small>}</div>
        <div className="jb-label">{view === "client" ? "Private Gallery" : "Client Galleries"}</div>
      </div>

      {view === "client" && screen === "entry" && (
        <div className="jb-entry">
          <div className="jb-scan jb-fade" style={{ animationDelay: ".05s" }}><span className="dot" /> Opened from your event card</div>
          <div className="jb-label jb-fade" style={{ animationDelay: ".15s" }}>Joseph Bucci · Photography</div>
          <h1 className="jb-serif jb-fade" style={{ animationDelay: ".25s" }}>Your photographs are ready</h1>
          <div className="meta jb-fade" style={{ animationDelay: ".4s" }}><b>Hamilton Golf Classic — 2026</b> &nbsp;·&nbsp; 240 images &nbsp;·&nbsp; June 2026</div>
          <button className="jb-btn jb-fade" style={{ animationDelay: ".55s" }} onClick={() => setScreen("gallery")}>View your gallery</button>
        </div>
      )}

      {view === "client" && screen === "gallery" && (
        <div className="jb-gwrap">
          <div className="jb-ghead">
            <div>
              <div className="jb-label" style={{ marginBottom: 8 }}>Hamilton Golf Classic — 2026</div>
              <h2 className="jb-serif">Select your favourites</h2>
            </div>
            <button className="jb-btn ghost" disabled={!cart.length} onClick={() => setScreen("cart")}>Selection ({cart.length})</button>
          </div>
          <div className="jb-grid">
            {PHOTOS.map((p, i) => (
              <div key={p.id} className={"jb-cell" + (p.tall ? " tall" : "")} onClick={() => setLb(p)}>
                <img src={photo(p.seed)} alt={"Frame " + p.id} loading="lazy" />
                <div className="jb-wm"><span>Joseph Bucci · Preview</span></div>
                <div className="num">{String(i + 1).padStart(2, "0")}</div>
                <button className={"jb-pick" + (inCart(p.id) ? " on" : "")} onClick={(e) => { e.stopPropagation(); togglePick(p.id); }}>{inCart(p.id) ? "✓" : "+"}</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {view === "client" && screen === "cart" && (
        <div className="jb-page">
          <div className="jb-label" style={{ marginBottom: 8 }}>Your order</div>
          <h2 className="jb-serif">Selection</h2>
          {!cart.length ? (
            <div className="jb-empty">Nothing selected yet.<br /><br /><button className="jb-btn ghost" onClick={() => setScreen("gallery")}>Back to gallery</button></div>
          ) : (
            <>
              <div style={{ marginTop: 20 }}>
                {cart.map((it) => { const p = PHOTOS.find((x) => x.id === it.pid);
                  return (
                    <div className="jb-rowi" key={it.uid}>
                      <img src={photo(p.seed)} alt="" />
                      <div className="info">
                        <div className="t">Frame {String(it.pid).padStart(2, "0")}</div>
                        <div className="s">{it.nm} · {it.sub}</div>
                        <button className="rm" onClick={() => setCart((c) => c.filter((x) => x.uid !== it.uid))}>Remove</button>
                      </div>
                      <div className="price jb-serif">${it.price}</div>
                    </div>
                  ); })}
              </div>
              <div className="jb-tot"><span className="lbl">Total</span><span className="amt jb-serif">${total}</span></div>
              <div style={{ display: "flex", gap: 12, marginTop: 26, flexWrap: "wrap" }}>
                <button className="jb-btn ghost" onClick={() => setScreen("gallery")}>Add more</button>
                <button className="jb-btn" onClick={() => setScreen("checkout")}>Checkout</button>
              </div>
            </>
          )}
        </div>
      )}

      {view === "client" && screen === "checkout" && (
        <div className="jb-page">
          <div className="jb-label" style={{ marginBottom: 8 }}>Secure checkout</div>
          <h2 className="jb-serif">Almost yours</h2>
          <div style={{ marginTop: 26, marginBottom: 30 }}>
            <div className="jb-field"><label>Email — for delivery</label><input placeholder="you@email.com" /></div>
            <div className="jb-field"><label>Name on card</label><input placeholder="Full name" /></div>
            <div className="jb-field"><label>Card number</label><input placeholder="1234  5678  9012  3456" /></div>
            <div className="jb-2col">
              <div className="jb-field"><label>Expiry</label><input placeholder="MM / YY" /></div>
              <div className="jb-field"><label>CVC</label><input placeholder="•••" /></div>
            </div>
          </div>
          <div className="jb-tot" style={{ marginTop: 0 }}><span className="lbl">Total due</span><span className="amt jb-serif">${total}</span></div>
          <button className="jb-btn" style={{ width: "100%", marginTop: 24 }} onClick={() => setScreen("success")}>Pay ${total}</button>
          <p style={{ textAlign: "center", color: "var(--soft)", fontSize: 11, letterSpacing: "0.1em", marginTop: 16, textTransform: "uppercase" }}>Powered by Stripe · demo only</p>
        </div>
      )}

      {view === "client" && screen === "success" && (
        <div className="jb-succ">
          <div className="ring jb-fade">✓</div>
          <div className="jb-label jb-fade" style={{ animationDelay: ".1s" }}>Order confirmed</div>
          <h2 className="jb-serif jb-fade" style={{ animationDelay: ".2s" }}>Thank you</h2>
          <p className="jb-fade" style={{ animationDelay: ".3s", color: "var(--soft)", fontSize: 15, lineHeight: 1.6 }}>Your high-resolution files are ready to download, and any prints are on their way. A copy of the link has been sent to your email.</p>
          <div className="jb-dl jb-fade" style={{ animationDelay: ".45s" }}>
            <button className="jb-btn" onClick={() => setNote("Download started (demo)")}>Download files</button>
            <button className="jb-btn ghost" onClick={() => { setCart([]); setScreen("entry"); }}>Done</button>
          </div>
        </div>
      )}

      {view === "studio" && (
        <div className="jb-studio">
          <div className="jb-label" style={{ marginBottom: 10 }}>Joseph Bucci · Studio</div>
          <h2 className="jb-serif" style={{ fontSize: "clamp(30px,5vw,46px)", fontWeight: 400, letterSpacing: "-0.02em" }}>Galleries</h2>
          <p className="sub">Create a private gallery for each event, then hand each player a card with its QR code. They scan, browse, and buy prints or digital files — payouts land in your account automatically.</p>
          <div className="jb-gal-grid">
            {STUDIO_GALLERIES.map((g) => (
              <div className="jb-gcard" key={g.id}>
                <div className="cover"><img src={photo(g.seed)} alt="" /><span className="st">{g.status}</span></div>
                <div className="body"><h3 className="jb-serif">{g.name}</h3><div className="m">{g.imgs} images · client gallery</div></div>
                <div className="qr">
                  <QR size={84} seed={g.id + 3} />
                  <div className="acts">
                    <button className="jb-mini" onClick={() => setNote("Link copied")}>Copy link</button>
                    <button className="jb-mini" onClick={() => setNote("QR downloaded (demo)")}>Download QR</button>
                  </div>
                </div>
              </div>
            ))}
            <button className="jb-newcard" onClick={() => setNote("New gallery — in the full build")}>
              <div style={{ textAlign: "center" }}><div className="plus jb-serif">+</div><div className="jb-label">New gallery</div></div>
            </button>
          </div>
        </div>
      )}

      {lb && (
        <div className="jb-lb" onClick={() => setLb(null)}>
          <button className="jb-close" onClick={() => setLb(null)}>×</button>
          <div className="jb-lb-inner" onClick={(e) => e.stopPropagation()}>
            <div className="jb-lb-img"><img src={photo(lb.seed)} alt="" /><div className="jb-wm"><span>Joseph Bucci · Preview</span></div></div>
            <div className="jb-lb-panel">
              <div className="jb-label" style={{ color: "rgba(244,242,238,0.55)", marginBottom: 6 }}>Frame {String(lb.id).padStart(2, "0")}</div>
              <h3 className="jb-serif">Choose a format</h3>
              <div style={{ marginTop: 14 }}>
                {OPTIONS.map((o) => (<div className="jb-opt" key={o.key} onClick={() => { addItem(lb.id, o); }}><div className="nm">{o.nm}<small>{o.sub}</small></div><div className="pr jb-serif">${o.price}</div></div>))}
              </div>
              <button className="jb-btn" style={{ width: "100%", marginTop: 22, background: "#f4f2ee", color: "#16130f", border: "1px solid #f4f2ee" }} onClick={() => setLb(null)}>Done</button>
            </div>
          </div>
        </div>
      )}

      {note && <div className="jb-note">{note}</div>}

      <div className="jb-toggle">
        <button className={view === "client" ? "on" : ""} onClick={() => { setView("client"); setScreen("entry"); }}>Client view</button>
        <button className={view === "studio" ? "on" : ""} onClick={() => setView("studio")}>Studio view</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
